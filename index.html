<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astro Compatibility</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #e2e8f0;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: none;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

button {
  width: 100%;
  padding: 12px;
  background: #6366f1;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.result {
  font-size: 18px;
}

.badge {
  display: inline-block;
  padding: 6px 10px;
  border-radius: 8px;
  background: #334155;
  margin: 4px;
}

.chart {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
  margin-top: 10px;
}

.box {
  border: 1px solid #475569;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="container">
<h1>🔮 Kundli Compatibility (36 Gun Milan)</h1>

<div class="grid">

<div class="card">
<h3>Person 1</h3>
<input type="date" id="dob1">
<input type="time" id="time1">
<input type="text" id="place1" placeholder="City">
</div>

<div class="card">
<h3>Person 2</h3>
<input type="date" id="dob2">
<input type="time" id="time2">
<input type="text" id="place2" placeholder="City">
</div>

</div>

<button onclick="calculate()">Calculate Compatibility</button>

<div id="output" class="card result"></div>

</div>

<script>

// ---------- BASIC ASTRO ENGINE (SIMPLIFIED) ----------

// Convert DOB to pseudo moon position (approx)
function getMoonPosition(dateStr) {
  let date = new Date(dateStr);
  let days = Math.floor(date.getTime() / (1000 * 60 * 60 * 24));

  let nakshatra = (days % 27) + 1;
  let rashi = Math.floor((nakshatra - 1) / 2.25) + 1;

  return { nakshatra, rashi };
}

// ---------- KOOTA CALCULATIONS ----------

// Varna (1)
function varnaScore(r1, r2) {
  return r1 >= r2 ? 1 : 0;
}

// Vashya (2)
function vashyaScore() {
  return 2;
}

// Tara (3)
function taraScore(n1, n2) {
  let diff = Math.abs(n1 - n2) % 9;
  return (diff === 0 || diff === 3 || diff === 5) ? 3 : 1;
}

// Yoni (4)
function yoniScore(n1, n2) {
  return (n1 % 2 === n2 % 2) ? 4 : 2;
}

// Graha Maitri (5)
function grahaMaitriScore(r1, r2) {
  return (r1 % 3 === r2 % 3) ? 5 : 3;
}

// Gana (6)
function ganaScore(n1, n2) {
  return (n1 % 3 === n2 % 3) ? 6 : 3;
}

// Bhakoot (7)
function bhakootScore(r1, r2) {
  let diff = Math.abs(r1 - r2);
  return (diff === 6 || diff === 8) ? 0 : 7;
}

// Nadi (8)
function nadiScore(n1, n2) {
  return (n1 % 3 === n2 % 3) ? 0 : 8;
}

function calculateGunMilan(p1, p2) {
  let scores = {
    Varna: varnaScore(p1.rashi, p2.rashi),
    Vashya: vashyaScore(),
    Tara: taraScore(p1.nakshatra, p2.nakshatra),
    Yoni: yoniScore(p1.nakshatra, p2.nakshatra),
    GrahaMaitri: grahaMaitriScore(p1.rashi, p2.rashi),
    Gana: ganaScore(p1.nakshatra, p2.nakshatra),
    Bhakoot: bhakootScore(p1.rashi, p2.rashi),
    Nadi: nadiScore(p1.nakshatra, p2.nakshatra)
  };

  let total = Object.values(scores).reduce((a,b)=>a+b,0);
  return { total, scores };
}

// ---------- UI ----------

function createChart(rashi) {
  let html = '<div class="chart">';
  for (let i = 1; i <= 12; i++) {
    html += `<div class="box">${i === rashi ? "🌙" : ""}</div>`;
  }
  html += '</div>';
  return html;
}

function interpret(score) {
  if (score >= 28) return "Excellent match 💚";
  if (score >= 18) return "Good match 👍";
  return "Needs deeper analysis ⚠️";
}

function calculate() {
  let dob1 = document.getElementById("dob1").value;
  let dob2 = document.getElementById("dob2").value;

  if (!dob1 || !dob2) {
    alert("Enter both dates");
    return;
  }

  let p1 = getMoonPosition(dob1);
  let p2 = getMoonPosition(dob2);

  let result = calculateGunMilan(p1, p2);

  let breakdown = Object.entries(result.scores)
    .map(([k,v]) => `<span class="badge">${k}: ${v}</span>`)
    .join("");

  document.getElementById("output").innerHTML = `
    <h2>Total Score: ${result.total} / 36</h2>
    <p>${interpret(result.total)}</p>

    <h3>Breakdown</h3>
    ${breakdown}

    <h3>Person 1 Chart</h3>
    ${createChart(p1.rashi)}

    <h3>Person 2 Chart</h3>
    ${createChart(p2.rashi)}
  `;
}

</script>

</body>
</html>
